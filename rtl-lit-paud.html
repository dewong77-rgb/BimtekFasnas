<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RTL Literasi Dasar PAUD - Direktorat SMA</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<style>
  :root{ --navy:#1A3E6F; --gold:#E8A020; --gray:#4A4A4A; --border:#CCCCCC; --bg:#F5F6F8; }
  *{box-sizing:border-box;}
  body{ margin:0; padding:0; font-family:"Segoe UI", Arial, sans-serif; background:var(--bg); color:var(--gray); }
  .header{ background:var(--navy); color:#fff; padding:20px 16px 14px; text-align:center; }
  .header h1{margin:0; font-size:18px; font-weight:700;}
  .header p{margin:4px 0 0; font-size:13px; opacity:.9;}
  .header .accent{height:4px; width:40%; background:var(--gold); margin:10px auto 0;}
  .wrap{max-width:900px; margin:0 auto; padding:16px;}
  a.back{color:var(--navy); font-size:13px; text-decoration:none; display:inline-block; margin-bottom:10px;}
  .card{ background:#fff; border:1px solid var(--border); border-radius:6px; padding:16px 18px; margin-bottom:14px; }
  .card h2{ font-size:14px; color:var(--navy); margin:0 0 10px; border-bottom:2px solid var(--gold); padding-bottom:6px; display:inline-block; }
  label{display:block; font-size:13px; margin:10px 0 4px; font-weight:600;}
  input[type=text], select, textarea{
    width:100%; padding:8px 10px; font-size:14px; border:1px solid var(--border); border-radius:4px; font-family:inherit;
  }
  textarea{resize:vertical;}
  .row2{display:flex; gap:12px; flex-wrap:wrap;}
  .row2 > div{flex:1; min-width:220px;}
  table.kegiatan{width:100%; border-collapse:collapse; margin-top:8px; font-size:12px;}
  table.kegiatan th{ background:var(--navy); color:#fff; padding:6px; text-align:left; font-size:11px; }
  table.kegiatan td{ border:1px solid var(--border); padding:6px; vertical-align:top; }
  table.kegiatan td.no-col{width:28px; text-align:center; font-weight:600;}
  table.kegiatan td.kegiatan-col{font-size:12px; background:#F5F6F8;}
  table.kegiatan td input, table.kegiatan td textarea{ border:none; padding:2px; font-size:12px; width:100%; }
  .hint{font-size:11px; color:#888; margin-top:2px;}
  .tabs{display:flex; gap:6px; margin-bottom:10px;}
  .tab-btn{ flex:1; padding:8px; text-align:center; border:1px solid var(--border); background:#fff; cursor:pointer; font-size:13px; border-radius:4px; }
  .tab-btn.active{background:var(--navy); color:#fff; border-color:var(--navy);}
  #sigCanvas{ border:1px dashed var(--border); border-radius:4px; width:100%; max-width:500px; height:180px; touch-action:none; display:block; background:#fff; }
  .sig-panel{display:none;}
  .sig-panel.active{display:block;}
  #uploadPreview{max-width:300px; max-height:150px; margin-top:8px; display:none;}
  .btn{ background:var(--navy); color:#fff; border:none; padding:9px 16px; border-radius:4px; font-size:13px; cursor:pointer; font-weight:600; }
  .btn.secondary{background:#fff; color:var(--navy); border:1px solid var(--navy);}
  .btn.small{padding:4px 8px; font-size:11px;}
  .btn:disabled{opacity:.5; cursor:not-allowed;}
  .submit-area{text-align:center; padding:10px 0 30px;}
  #submitBtn{padding:12px 40px; font-size:15px;}
  .status{ text-align:center; padding:12px; border-radius:4px; margin-top:12px; font-size:13px; display:none; }
  .status.ok{background:#e6f4ea; color:#1e7e34; display:block;}
  .status.err{background:#fdecea; color:#c0392b; display:block;}
  .required:after{content:" *"; color:#c0392b;}
</style>
</head>
<body>

<div class="header">
  <h1>RENCANA TINDAK LANJUT (RTL) BIMTEK</h1>
  <p id="jenisLabel">Direktorat SMA, Kemendikdasmen</p>
  <div class="accent"></div>
</div>

<div class="wrap">
  <a class="back" href="index.html">&larr; Kembali ke menu</a>

  <form id="rtlBimtekForm">

    <div class="card">
      <h2>Data Peserta</h2>
      <div class="row2">
        <div>
          <label class="required">Nama</label>
          <input type="text" id="nama" required>
        </div>
        <div>
          <label class="required">Jabatan</label>
          <input type="text" id="jabatan" required>
        </div>
      </div>
      <label class="required">Nama Satuan Pendidikan</label>
      <input type="text" id="satuanPendidikan" required>
      <div class="row2">
        <div>
          <label class="required">No. HP</label>
          <input type="text" id="noHp" required>
        </div>
        <div>
          <label class="required">Kab/Kota</label>
          <input type="text" id="kabKota" required>
        </div>
      </div>
      <label class="required">Provinsi</label>
      <input type="text" id="provinsi" required>
    </div>

    <div class="card">
      <h2>Rencana Tindak Lanjut</h2>
      <table class="kegiatan" id="kegiatanTable">
        <thead>
          <tr>
            <th class="no-col">No</th>
            <th style="width:30%">Kegiatan</th>
            <th style="width:16%">Waktu Pelaksanaan</th>
            <th style="width:22%">Pihak yang Terlibat</th>
            <th style="width:20%">Lokasi Kegiatan</th>
          </tr>
        </thead>
        <tbody id="kegiatanBody"></tbody>
      </table>
    </div>

    <div class="card">
      <h2>Tanda Tangan Penyusun</h2>
      <div class="tabs">
        <div class="tab-btn active" data-tab="draw">Gambar Langsung</div>
        <div class="tab-btn" data-tab="upload">Upload Foto</div>
      </div>
      <div class="sig-panel active" id="panel-draw">
        <canvas id="sigCanvas" width="500" height="180"></canvas>
        <button type="button" class="btn secondary small" id="clearSigBtn" style="margin-top:8px;">Hapus Coretan</button>
      </div>
      <div class="sig-panel" id="panel-upload">
        <input type="file" id="sigUpload" accept="image/*">
        <img id="uploadPreview">
      </div>
    </div>

    <div class="submit-area">
      <button type="submit" class="btn" id="submitBtn">Kirim &amp; Unduh PDF</button>
      <div class="status" id="statusBox"></div>
    </div>

  </form>
</div>

<script>
// =====================================================================
// KONFIGURASI
// =====================================================================
const CONFIG = {
  SCRIPT_URL: "https://script.google.com/macros/s/AKfycbzy4IIoooYUTTHzI67lch6fAR68ffObe5ZciPA5vZ6zkD0P80iR_E9xAeBLjFzNyKlY/exec"
};

const JENIS = {
  kode: 'litnum_paud',
  judul: 'BIMTEK LITERASI DASAR PENDIDIK PAUD',
  kegiatan: [
    { teks: 'Pelaporan hasil kegiatan kepada kepala sekolah' },
    { teks: 'Penyempurnaan RPP penguatan literasi numerasi' },
    { teks: 'Pelaksanaan aksi nyata (implementasi RPP) di sekolah' },
    { teks: 'Pelaksanaan pengimbasan (sekolah sendiri dan sekolah lain)', hint: 'Tuliskan nama 10 sekolah imbas' },
    { teks: 'Publikasi praktik baik yang telah dilakukan di medsos (YouTube/IG/TikTok) dan tagging medsos BBPMP Prov Jatim' }
  ]
};

const jenisLabel = document.getElementById('jenisLabel');
const kegiatanBody = document.getElementById('kegiatanBody');
jenisLabel.textContent = JENIS.judul + ' - Direktorat SMA, Kemendikdasmen';

function renderKegiatan(){
  kegiatanBody.innerHTML = '';
  JENIS.kegiatan.forEach((k, idx) => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td class="no-col">${idx+1}</td>
      <td class="kegiatan-col">${k.teks}</td>
      <td><input type="text" data-field="waktu"></td>
      <td><textarea rows="2" data-field="pihak" placeholder="${k.hint || ''}"></textarea></td>
      <td><input type="text" data-field="lokasi"></td>
    `;
    kegiatanBody.appendChild(tr);
  });
}
renderKegiatan();

function getKegiatanData(){
  return [...kegiatanBody.rows].map((row, idx) => ({
    no: idx + 1,
    kegiatan: JENIS.kegiatan[idx].teks,
    waktu: row.querySelector('[data-field="waktu"]').value.trim(),
    pihak: row.querySelector('[data-field="pihak"]').value.trim(),
    lokasi: row.querySelector('[data-field="lokasi"]').value.trim()
  }));
}

// ---------------------------------------------------------------------
// Tab & signature pad (sama seperti form RTL sebelumnya)
// ---------------------------------------------------------------------
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.sig-panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('panel-' + btn.dataset.tab).classList.add('active');
  });
});

const canvas = document.getElementById('sigCanvas');
const ctx = canvas.getContext('2d');
ctx.lineWidth = 2; ctx.lineCap = 'round'; ctx.strokeStyle = '#1A3E6F';
let drawing = false, hasDrawn = false;

function getPos(e){
  const rect = canvas.getBoundingClientRect();
  return {
    x: (e.clientX - rect.left) * (canvas.width / rect.width),
    y: (e.clientY - rect.top) * (canvas.height / rect.height)
  };
}
canvas.addEventListener('pointerdown', e => { drawing = true; hasDrawn = true; const p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); });
canvas.addEventListener('pointermove', e => { if(!drawing) return; const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); });
window.addEventListener('pointerup', () => drawing = false);
document.getElementById('clearSigBtn').addEventListener('click', () => { ctx.clearRect(0,0,canvas.width,canvas.height); hasDrawn = false; });

let uploadedSigDataUrl = null;
document.getElementById('sigUpload').addEventListener('change', function(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(evt){
    const img = new Image();
    img.onload = function(){
      const maxW = 500;
      const scale = Math.min(1, maxW / img.width);
      const c = document.createElement('canvas');
      c.width = img.width * scale; c.height = img.height * scale;
      const cctx = c.getContext('2d');
      cctx.fillStyle = '#fff'; cctx.fillRect(0,0,c.width,c.height);
      cctx.drawImage(img, 0, 0, c.width, c.height);
      uploadedSigDataUrl = c.toDataURL('image/jpeg', 0.7);
      const prev = document.getElementById('uploadPreview');
      prev.src = uploadedSigDataUrl; prev.style.display = 'block';
    };
    img.src = evt.target.result;
  };
  reader.readAsDataURL(file);
});

function getSignatureDataUrl(){
  const activeTab = document.querySelector('.tab-btn.active').dataset.tab;
  if(activeTab === 'draw') return hasDrawn ? canvas.toDataURL('image/png') : null;
  return uploadedSigDataUrl;
}

// ---------------------------------------------------------------------
// Validasi
// ---------------------------------------------------------------------
function validate(){
  const required = ['nama','jabatan','satuanPendidikan','noHp','kabKota','provinsi'];
  for(const id of required){
    if(!document.getElementById(id).value.trim()){
      alert('Mohon lengkapi semua kolom wajib (bertanda *).');
      document.getElementById(id).focus();
      return false;
    }
  }
  const kegiatan = getKegiatanData();
  for(const k of kegiatan){
    if(!k.waktu || !k.pihak || !k.lokasi){
      alert('Mohon lengkapi Waktu Pelaksanaan, Pihak yang Terlibat, dan Lokasi untuk semua kegiatan.');
      return false;
    }
  }
  if(!getSignatureDataUrl()){
    alert('Tanda tangan wajib diisi — gambar langsung atau upload foto.');
    return false;
  }
  return true;
}

// ---------------------------------------------------------------------
// Generate PDF
// ---------------------------------------------------------------------
const BULAN = ['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];

function generatePDF(data){
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation: 'p', unit: 'mm', format: 'a4' });
  const pageW = doc.internal.pageSize.getWidth();
  const jenis = JENIS;

  doc.setFillColor(26, 62, 111);
  doc.rect(0, 0, pageW, 22, 'F');
  doc.setTextColor(255,255,255);
  doc.setFont('helvetica', 'bold'); doc.setFontSize(13);
  doc.text('RENCANA TINDAK LANJUT', pageW/2, 9, { align: 'center' });
  doc.setFontSize(10.5); doc.setFont('helvetica', 'normal');
  doc.text(jenis.judul, pageW/2, 16, { align: 'center' });

  doc.setFillColor(232, 160, 32);
  doc.rect(pageW/2 - (pageW*0.4)/2, 22, pageW*0.4, 1.5, 'F');

  doc.setTextColor(50,50,50);
  let y = 33;
  const rows = [
    ['Nama', data.nama, 'Jabatan', data.jabatan],
    ['Nama Satuan Pendidikan', data.satuanPendidikan, 'No. HP', data.noHp],
    ['Kab/Kota', data.kabKota, 'Provinsi', data.provinsi]
  ];
  rows.forEach(r => {
    doc.setFont('helvetica', 'bold'); doc.setFontSize(10);
    doc.text(r[0], 14, y); doc.text(':', 62, y);
    doc.setFont('helvetica', 'normal'); doc.text(String(r[1]), 65, y);
    doc.setFont('helvetica', 'bold');
    doc.text(r[2], 118, y); doc.text(':', 150, y);
    doc.setFont('helvetica', 'normal'); doc.text(String(r[3]), 153, y);
    y += 6;
  });

  y += 4;
  doc.autoTable({
    startY: y,
    margin: { left: 14, right: 14 },
    head: [['No','Kegiatan','Waktu\nPelaksanaan','Pihak yang\nTerlibat','Lokasi\nKegiatan']],
    body: data.kegiatan.map(k => [k.no, k.kegiatan, k.waktu, k.pihak, k.lokasi]),
    styles: { fontSize: 8.5, cellPadding: 3, valign: 'top' },
    headStyles: { fillColor: [26,62,111], textColor: 255, fontStyle: 'bold' },
    columnStyles: {
      0: { cellWidth: 8, halign: 'center' },
      1: { cellWidth: 55 },
      2: { cellWidth: 28 },
      3: { cellWidth: 40 },
      4: { cellWidth: 'auto' }
    }
  });

  y = doc.lastAutoTable.finalY + 16;
  if(y > 240){ doc.addPage(); y = 20; }

  const today = new Date();
  const tanggal = today.getDate() + ' ' + BULAN[today.getMonth()] + ' ' + today.getFullYear();
  const rightX = pageW - 14;

  doc.setFont('helvetica', 'normal'); doc.setFontSize(10);
  doc.text(data.kabKota + ', ' + tanggal, rightX, y, { align: 'right' });
  y += 5;
  doc.text('Penyusun,', rightX, y, { align: 'right' });
  y += 4;

  if(data.signature){
    try{ doc.addImage(data.signature, 'PNG', rightX - 55, y, 55, 25); }
    catch(e){ try{ doc.addImage(data.signature, 'JPEG', rightX - 55, y, 55, 25); }catch(e2){} }
  }
  y += 27;
  doc.text('(' + data.nama + ')', rightX, y, { align: 'right' });

  const pageCount = doc.internal.getNumberOfPages();
  for(let i=1; i<=pageCount; i++){
    doc.setPage(i);
    doc.setFontSize(8); doc.setTextColor(120,120,120);
    doc.text('Direktorat SMA | Kemendikdasmen', 14, 287);
    doc.text('Halaman ' + i + ' / ' + pageCount, pageW - 14, 287, { align: 'right' });
  }

  return doc;
}

// ---------------------------------------------------------------------
// Kirim ke rekap
// ---------------------------------------------------------------------
async function sendToSheet(data, attempt){
  attempt = attempt || 1;
  try{
    const res = await fetch(CONFIG.SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(data)
    });
    return await res.json();
  }catch(err){
    if(attempt < 3){
      await new Promise(r => setTimeout(r, 1500 * attempt));
      return sendToSheet(data, attempt + 1);
    }
    throw err;
  }
}

document.getElementById('rtlBimtekForm').addEventListener('submit', async function(e){
  e.preventDefault();
  if(!validate()) return;

  const submitBtn = document.getElementById('submitBtn');
  const statusBox = document.getElementById('statusBox');
  submitBtn.disabled = true;
  submitBtn.textContent = 'Memproses...';
  statusBox.style.display = 'none';

  const payload = {
    formType: 'rtl_bimtek',
    timestamp: new Date().toISOString(),
    jenisBimtek: JENIS.kode,
    jenisBimtekLabel: JENIS.judul,
    nama: document.getElementById('nama').value.trim(),
    jabatan: document.getElementById('jabatan').value.trim(),
    satuanPendidikan: document.getElementById('satuanPendidikan').value.trim(),
    noHp: document.getElementById('noHp').value.trim(),
    kabKota: document.getElementById('kabKota').value.trim(),
    provinsi: document.getElementById('provinsi').value.trim(),
    kegiatan: getKegiatanData(),
    signature: getSignatureDataUrl()
  };

  try{
    const doc = generatePDF(payload);
    doc.save('RTL_' + payload.jenisBimtek + '_' + payload.nama.replace(/\s+/g,'_') + '.pdf');

    payload.pdfFile = doc.output('datauristring');
    const result = await sendToSheet(payload);

    statusBox.className = 'status ok';
    statusBox.textContent = 'PDF berhasil diunduh. Data tersimpan ke rekap panitia.';
  }catch(err){
    console.error(err);
    statusBox.className = 'status err';
    statusBox.textContent = 'PDF berhasil dibuat, tapi pengiriman ke rekap gagal. Simpan PDF ini dan hubungi panitia. (' + err.message + ')';
  }finally{
    submitBtn.disabled = false;
    submitBtn.textContent = 'Kirim & Unduh PDF';
  }
});
</script>
</body>
</html>
