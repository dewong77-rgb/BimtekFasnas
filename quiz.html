<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pretest/Posttest - Direktorat SMA</title>
<style>
  :root{ --navy:#1A3E6F; --gold:#E8A020; --gray:#4A4A4A; --border:#CCCCCC; --bg:#F5F6F8; }
  *{box-sizing:border-box;}
  body{ margin:0; padding:0; font-family:"Segoe UI", Arial, sans-serif; background:var(--bg); color:var(--gray); }
  .header{ background:var(--navy); color:#fff; padding:20px 16px 14px; text-align:center; }
  .header h1{margin:0; font-size:18px; font-weight:700;}
  .header p{margin:4px 0 0; font-size:13px; opacity:.9;}
  .header .accent{height:4px; width:40%; background:var(--gold); margin:10px auto 0;}
  .wrap{max-width:800px; margin:0 auto; padding:16px;}
  a.back{color:var(--navy); font-size:13px; text-decoration:none; display:inline-block; margin-bottom:10px;}
  .card{ background:#fff; border:1px solid var(--border); border-radius:6px; padding:16px 18px; margin-bottom:14px; }
  .card h2{ font-size:14px; color:var(--navy); margin:0 0 10px; border-bottom:2px solid var(--gold); padding-bottom:6px; display:inline-block; }
  label{display:block; font-size:13px; margin:10px 0 4px; font-weight:600;}
  input[type=text]{ width:100%; padding:8px 10px; font-size:14px; border:1px solid var(--border); border-radius:4px; font-family:inherit; }
  .required:after{content:" *"; color:#c0392b;}
  .q-card{ background:#fff; border:1px solid var(--border); border-radius:6px; padding:14px 16px; margin-bottom:10px; }
  .q-num{ font-size:11px; color:#888; font-weight:600; margin-bottom:4px; }
  .q-text{ font-size:14px; margin-bottom:10px; }
  .opt-row{ display:flex; align-items:flex-start; gap:8px; padding:6px 0; border-top:1px solid #f0f0f0; }
  .opt-row:first-of-type{border-top:none;}
  .opt-row input{ margin-top:3px; accent-color:var(--navy); cursor:pointer; }
  .opt-row label{ margin:0; font-weight:400; font-size:13.5px; cursor:pointer; }
  .btn{ background:var(--navy); color:#fff; border:none; padding:12px 40px; border-radius:4px; font-size:15px; cursor:pointer; font-weight:600; }
  .btn:disabled{opacity:.5; cursor:not-allowed;}
  .submit-area{text-align:center; padding:10px 0 30px;}
  .status{ text-align:center; padding:12px; border-radius:4px; margin-top:12px; font-size:13px; display:none; }
  .status.err{background:#fdecea; color:#c0392b; display:block;}
  .loading{ text-align:center; padding:40px; color:#888; font-size:14px; }
  .result-screen{ display:none; text-align:center; background:#fff; border:1px solid var(--border); border-radius:8px; padding:40px 24px; margin-top:20px; }
  .result-screen .score{ font-size:48px; font-weight:700; color:var(--navy); margin:10px 0; }
  .result-screen .detail{ font-size:14px; color:#555; margin-bottom:20px; }
  .result-screen .btn{ text-decoration:none; display:inline-block; }
</style>
</head>
<body>

<div class="header">
  <h1 id="pageTitle">PRETEST / POSTTEST</h1>
  <p id="pageSubtitle">Direktorat SMA, Kemendikdasmen</p>
  <div class="accent"></div>
</div>

<div class="wrap">
  <a class="back" href="index.html">&larr; Kembali ke menu</a>

  <div class="card">
    <label class="required">Nama</label>
    <input type="text" id="nama" required>
  </div>

  <div id="loadingBox" class="loading">Memuat soal...</div>

  <form id="quizForm" style="display:none;">
    <div id="questionsContainer"></div>
    <div class="submit-area">
      <button type="submit" class="btn" id="submitBtn">Kirim Jawaban</button>
      <div class="status" id="statusBox"></div>
    </div>
  </form>

  <div class="result-screen" id="resultScreen">
    <div style="font-size:14px; color:#888;">Nilai Kamu</div>
    <div class="score" id="scoreDisplay">-</div>
    <div class="detail" id="scoreDetail"></div>
    <a href="index.html" class="btn">Kembali ke Menu</a>
  </div>
</div>

<script>
// =====================================================================
// KONFIGURASI
// =====================================================================
const CONFIG = {
  SCRIPT_URL: "https://script.google.com/macros/s/AKfycbzy4IIoooYUTTHzI67lch6fAR68ffObe5ZciPA5vZ6zkD0P80iR_E9xAeBLjFzNyKlY/exec"
};

const BANK_LABEL = {
  spmi: 'SPMI',
  litnum: 'Literasi dan Numerasi',
  lit_paud: 'Literasi Dasar PAUD',
  digitalisasi: 'Digitalisasi Pembelajaran'
};

// ---------------------------------------------------------------------
// Baca parameter URL: ?bank=spmi&fase=pre
// ---------------------------------------------------------------------
const params = new URLSearchParams(window.location.search);
const bank = params.get('bank') || 'spmi';
const fase = params.get('fase') || 'pre';
const faseLabel = fase === 'post' ? 'Posttest' : 'Pretest';
const bankLabel = BANK_LABEL[bank] || bank.toUpperCase();

document.getElementById('pageTitle').textContent = faseLabel.toUpperCase() + ' - ' + bankLabel;
document.getElementById('pageSubtitle').textContent = 'Direktorat SMA, Kemendikdasmen';
document.title = faseLabel + ' ' + bankLabel + ' - Direktorat SMA';

// ---------------------------------------------------------------------
// Utilitas acak
// ---------------------------------------------------------------------
function shuffle(arr){
  const a = arr.slice();
  for(let i = a.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ---------------------------------------------------------------------
// Ambil soal dari Apps Script
// ---------------------------------------------------------------------
let renderedQuestions = [];

async function loadQuestions(){
  try{
    const url = CONFIG.SCRIPT_URL + '?action=getQuestions&bank=' + encodeURIComponent(bank);
    const res = await fetch(url);
    const result = await res.json();

    if(result.status !== 'success'){
      document.getElementById('loadingBox').textContent = 'Gagal memuat soal: ' + (result.message || 'tidak diketahui');
      return;
    }

    const shuffledQuestions = shuffle(result.questions);
    renderedQuestions = shuffledQuestions.map(q => {
      const opts = shuffle([
        { letter: 'A', text: q.opsiA },
        { letter: 'B', text: q.opsiB },
        { letter: 'C', text: q.opsiC },
        { letter: 'D', text: q.opsiD }
      ]);
      return { no: q.no, soal: q.soal, opsi: opts };
    });

    renderQuestions();
    document.getElementById('loadingBox').style.display = 'none';
    document.getElementById('quizForm').style.display = 'block';
  }catch(err){
    document.getElementById('loadingBox').textContent = 'Gagal memuat soal. Coba refresh halaman. (' + err.message + ')';
  }
}

function renderQuestions(){
  const container = document.getElementById('questionsContainer');
  container.innerHTML = '';
  renderedQuestions.forEach((q, idx) => {
    const card = document.createElement('div');
    card.className = 'q-card';
    const optsHtml = q.opsi.map((o, oi) => `
      <div class="opt-row">
        <input type="radio" name="q_${q.no}" id="q_${q.no}_${oi}" value="${o.letter}" required>
        <label for="q_${q.no}_${oi}">${o.text}</label>
      </div>
    `).join('');
    card.innerHTML = `
      <div class="q-num">Soal ${idx + 1} dari ${renderedQuestions.length}</div>
      <div class="q-text">${q.soal}</div>
      ${optsHtml}
    `;
    container.appendChild(card);
  });
}

// ---------------------------------------------------------------------
// Validasi & submit
// ---------------------------------------------------------------------
function getJawaban(){
  return renderedQuestions.map(q => {
    const checked = document.querySelector('input[name="q_' + q.no + '"]:checked');
    return { no: q.no, dipilih: checked ? checked.value : null };
  });
}

function validate(){
  if(!document.getElementById('nama').value.trim()){
    alert('Mohon isi Nama.');
    return false;
  }
  const jawaban = getJawaban();
  if(jawaban.some(j => !j.dipilih)){
    alert('Mohon jawab semua soal sebelum mengirim.');
    return false;
  }
  return true;
}

async function submitJawaban(payload, attempt){
  attempt = attempt || 1;
  try{
    const res = await fetch(CONFIG.SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(payload)
    });
    return await res.json();
  }catch(err){
    if(attempt < 3){
      await new Promise(r => setTimeout(r, 1500 * attempt));
      return submitJawaban(payload, attempt + 1);
    }
    throw err;
  }
}

document.getElementById('quizForm').addEventListener('submit', async function(e){
  e.preventDefault();
  if(!validate()) return;

  const submitBtn = document.getElementById('submitBtn');
  const statusBox = document.getElementById('statusBox');
  submitBtn.disabled = true;
  submitBtn.textContent = 'Mengirim...';
  statusBox.style.display = 'none';

  const payload = {
    formType: 'pretest_posttest',
    bank: bank,
    fase: fase,
    nama: document.getElementById('nama').value.trim(),
    jawaban: getJawaban()
  };

  try{
    const result = await submitJawaban(payload);
    if(result.status !== 'success'){
      throw new Error(result.message || 'Gagal menghitung skor.');
    }
    document.getElementById('quizForm').style.display = 'none';
    document.getElementById('scoreDisplay').textContent = result.skor;
    document.getElementById('scoreDetail').textContent =
      result.benar + ' benar, ' + result.salah + ' salah, dari ' + result.total + ' soal.';
    document.getElementById('resultScreen').style.display = 'block';
    document.getElementById('resultScreen').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }catch(err){
    console.error(err);
    statusBox.className = 'status err';
    statusBox.style.display = 'block';
    statusBox.textContent = 'Gagal mengirim jawaban. Coba lagi sebentar lagi. (' + err.message + ')';
    submitBtn.disabled = false;
    submitBtn.textContent = 'Kirim Jawaban';
  }
});

loadQuestions();
</script>
</body>
</html>
