<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Evaluasi Kegiatan - Direktorat SMA</title>
<style>
  :root{
    --navy:#1A3E6F;
    --gold:#E8A020;
    --gray:#4A4A4A;
    --border:#CCCCCC;
    --bg:#F5F6F8;
  }
  *{box-sizing:border-box;}
  body{ margin:0; padding:0; font-family:"Segoe UI", Arial, sans-serif; background:var(--bg); color:var(--gray); }
  .header{ background:var(--navy); color:#fff; padding:20px 16px 14px; text-align:center; }
  .header h1{margin:0; font-size:18px; font-weight:700;}
  .header p{margin:4px 0 0; font-size:13px; opacity:.9;}
  .header .accent{height:4px; width:40%; background:var(--gold); margin:10px auto 0;}
  .wrap{max-width:800px; margin:0 auto; padding:16px;}
  .card{ background:#fff; border:1px solid var(--border); border-radius:6px; padding:16px 18px; margin-bottom:14px; }
  .card h2{
    font-size:14px; color:var(--navy); margin:0 0 4px;
    border-bottom:2px solid var(--gold); padding-bottom:6px; display:inline-block;
  }
  .card .sub{font-size:12px; color:#888; margin:0 0 10px;}
  label{display:block; font-size:13px; margin:6px 0 4px; font-weight:600;}
  input[type=text], textarea{
    width:100%; padding:8px 10px; font-size:14px;
    border:1px solid var(--border); border-radius:4px; font-family:inherit;
  }
  textarea{resize:vertical;}
  .legend{
    display:flex; flex-wrap:wrap; gap:10px; font-size:12px; background:#F5F6F8;
    border:1px solid var(--border); border-radius:4px; padding:10px;
  }
  .legend span{white-space:nowrap;}
  .legend b{color:var(--navy);}
  .rating-item{ padding:10px 0; border-bottom:1px solid #eee; }
  .rating-item:last-child{border-bottom:none;}
  .rating-item .q-text{font-size:13px; margin-bottom:8px; display:block;}
  .scale-row{display:flex; gap:14px; align-items:center; flex-wrap:wrap;}
  .scale-opt{display:flex; flex-direction:column; align-items:center; font-size:11px; color:#888; gap:2px;}
  .scale-opt input{width:18px; height:18px; accent-color:var(--navy); cursor:pointer;}
  .btn{
    background:var(--navy); color:#fff; border:none; padding:12px 40px;
    border-radius:4px; font-size:15px; cursor:pointer; font-weight:600;
  }
  .btn:disabled{opacity:.5; cursor:not-allowed;}
  .submit-area{text-align:center; padding:10px 0 30px;}
  .status{ text-align:center; padding:12px; border-radius:4px; margin-top:12px; font-size:13px; display:none; }
  .status.ok{background:#e6f4ea; color:#1e7e34; display:block;}
  .status.err{background:#fdecea; color:#c0392b; display:block;}
  .required:after{content:" *"; color:#c0392b;}
  a.back{color:var(--navy); font-size:13px; text-decoration:none; display:inline-block; margin-bottom:10px;}
</style>
</head>
<body>

<div class="header">
  <h1>EVALUASI PENYELENGGARAAN KEGIATAN</h1>
  <p>Bimtek Fasnas - Direktorat SMA, Kemendikdasmen</p>
  <div class="accent"></div>
</div>

<div class="wrap">
  <a class="back" href="index.html">&larr; Kembali ke menu</a>

  <form id="evalForm">

    <div class="card">
      <h2>Data Responden</h2>
      <label class="required">Nama Samaran Responden (tanpa gelar)</label>
      <input type="text" id="namaSamaran" required>
    </div>

    <div class="card">
      <h2>Skala Penilaian</h2>
      <div class="legend">
        <span><b>1</b> Sangat Kurang</span>
        <span><b>2</b> Kurang</span>
        <span><b>3</b> Cukup</span>
        <span><b>4</b> Baik</span>
        <span><b>5</b> Baik Sekali</span>
      </div>
    </div>

    <div id="kategoriContainer"></div>

    <div class="card">
      <h2>Usul &amp; Saran</h2>
      <label>Usul untuk perbaikan kegiatan selanjutnya</label>
      <textarea id="usulPerbaikan" rows="3"></textarea>
      <label>Saran tambahan</label>
      <textarea id="saranTambahan" rows="3"></textarea>
    </div>

    <div class="submit-area">
      <button type="submit" class="btn" id="submitBtn">Kirim Evaluasi</button>
      <div class="status" id="statusBox"></div>
    </div>

  </form>
</div>

<script>
const CONFIG = {
  SCRIPT_URL: "https://script.google.com/macros/s/AKfycbzy4IIoooYUTTHzI67lch6fAR68ffObe5ZciPA5vZ6zkD0P80iR_E9xAeBLjFzNyKlY/exec"
};

const KATEGORI = [
  { kode: 'A', judul: 'Indikator Program Kegiatan', items: [
    'Kejelasan dan ketercapaian tujuan kegiatan',
    'Relevansi kegiatan dan materi dengan kebutuhan peserta',
    'Kebaruan dan nilai tambah materi',
    'Sistematika penyajian dan kesesuaian alokasi waktu'
  ]},
  { kode: 'B', judul: 'Indikator Sarana dan Prasarana Kegiatan', items: [
    'Kenyamanan dan kebersihan ruang serta lingkungan belajar',
    'Ketersediaan dan keberfungsian media, bahan, dan ATK pembelajaran',
    'Ketersediaan alat tulis peserta',
    'Kualitas akses internet di ruang belajar'
  ]},
  { kode: 'C', judul: 'Indikator Narasumber', items: [
    'Penguasaan materi dan metode pembelajaran',
    'Pemanfaatan media pembelajaran',
    'Kejelasan komunikasi (bahasa, nada, dan suara)',
    'Interaksi, motivasi, serta sikap dan perilaku',
    'Ketepatan menjawab pertanyaan dan ketepatan waktu penyajian'
  ]},
  { kode: 'D', judul: 'Indikator Layanan Akomodasi (Penginapan)', items: [
    'Kelengkapan, kebersihan, dan kenyamanan kamar serta kamar kecil',
    'Ketersediaan air bersih dan penerangan',
    'Kualitas pelayanan petugas akomodasi'
  ]},
  { kode: 'E', judul: 'Indikator Layanan Konsumsi', items: [
    'Kualitas, kuantitas, dan variasi menu makanan utama',
    'Kualitas, kuantitas, dan variasi menu kudapan/snack',
    'Kebersihan peralatan dan ruang makan',
    'Kualitas pelayanan petugas konsumsi'
  ]},
  { kode: 'F', judul: 'Indikator Kualitas Layanan', items: [
    'Kejelasan informasi prasyarat, prosedur, dan mekanisme layanan',
    'Ketepatan waktu dan kepastian biaya layanan',
    'Ketersediaan jenis layanan dalam satu pintu',
    'Kompetensi, sikap, dan keramahan petugas layanan',
    'Penanganan keluhan dan pengaduan',
    'Kelengkapan dan kenyamanan sarana dan prasarana layanan'
  ]}
];

const container = document.getElementById('kategoriContainer');
const allQuestionIds = [];

KATEGORI.forEach(kat => {
  const card = document.createElement('div');
  card.className = 'card';

  const h2 = document.createElement('h2');
  h2.textContent = kat.kode + '. ' + kat.judul;
  card.appendChild(h2);

  kat.items.forEach((teks, idx) => {
    const qid = kat.kode + (idx + 1);
    allQuestionIds.push(qid);

    const row = document.createElement('div');
    row.className = 'rating-item';

    const qText = document.createElement('span');
    qText.className = 'q-text';
    qText.textContent = (idx + 1) + '. ' + teks;
    row.appendChild(qText);

    const scaleRow = document.createElement('div');
    scaleRow.className = 'scale-row';
    for(let v = 1; v <= 5; v++){
      const opt = document.createElement('label');
      opt.className = 'scale-opt';
      opt.innerHTML = '<input type="radio" name="' + qid + '" value="' + v + '" required>' + v;
      scaleRow.appendChild(opt);
    }
    row.appendChild(scaleRow);
    card.appendChild(row);
  });

  container.appendChild(card);
});

function getRatings(){
  const ratings = {};
  let allAnswered = true;
  allQuestionIds.forEach(qid => {
    const checked = document.querySelector('input[name="' + qid + '"]:checked');
    if(checked){
      ratings[qid] = checked.value;
    } else {
      allAnswered = false;
    }
  });
  return { ratings, allAnswered };
}

function validate(){
  if(!document.getElementById('namaSamaran').value.trim()){
    alert('Mohon isi Nama Samaran Responden.');
    return false;
  }
  const { allAnswered } = getRatings();
  if(!allAnswered){
    alert('Mohon isi semua pertanyaan penilaian (1-5).');
    return false;
  }
  return true;
}

async function sendEvaluasi(data, attempt){
  attempt = attempt || 1;
  if(CONFIG.SCRIPT_URL.indexOf('GANTI_DENGAN') !== -1){
    console.warn('SCRIPT_URL belum diisi — data tidak dikirim.');
    return { status: 'skipped' };
  }
  try{
    const res = await fetch(CONFIG.SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(data)
    });
    return await res.json();
  }catch(err){
    if(attempt < 3){
      await new Promise(r => setTimeout(r, 1500 * attempt));
      return sendEvaluasi(data, attempt + 1);
    }
    throw err;
  }
}

document.getElementById('evalForm').addEventListener('submit', async function(e){
  e.preventDefault();
  if(!validate()) return;

  const submitBtn = document.getElementById('submitBtn');
  const statusBox = document.getElementById('statusBox');
  submitBtn.disabled = true;
  submitBtn.textContent = 'Mengirim...';
  statusBox.style.display = 'none';

  const { ratings } = getRatings();

  const payload = {
    formType: 'evaluasi',
    timestamp: new Date().toISOString(),
    namaSamaran: document.getElementById('namaSamaran').value.trim(),
    ratings: ratings,
    usulPerbaikan: document.getElementById('usulPerbaikan').value.trim(),
    saranTambahan: document.getElementById('saranTambahan').value.trim()
  };

  try{
    const result = await sendEvaluasi(payload);
    statusBox.className = 'status ok';
    statusBox.textContent = 'Terima kasih, evaluasi kamu sudah tersimpan.';
    if(result.status === 'skipped'){
      statusBox.textContent = 'Form belum tersambung ke rekap (SCRIPT_URL belum dikonfigurasi).';
    } else {
      document.getElementById('evalForm').reset();
    }
  }catch(err){
    console.error(err);
    statusBox.className = 'status err';
    statusBox.textContent = 'Gagal mengirim evaluasi. Coba lagi sebentar lagi. (' + err.message + ')';
  }finally{
    submitBtn.disabled = false;
    submitBtn.textContent = 'Kirim Evaluasi';
  }
});
</script>
</body>
</html>
